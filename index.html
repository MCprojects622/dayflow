<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dayflow</title>
<meta name="theme-color" content="#fdf8f3"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Dayflow"/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fdf8f3;
  --surface:#ffffff;
  --surface2:#f5efe6;
  --surface3:#ede3d6;
  --border:rgba(160,110,70,0.13);
  --border-strong:rgba(160,110,70,0.25);
  --text:#2c1810;
  --text-muted:#7a5c48;
  --text-faint:#b89a86;
  --accent:#c45c2a;
  --accent-light:#fbeee6;
  --accent-text:#7a2e0e;
  --green:#2d6a4f;
  --green-light:#e8f5ee;
  --green-text:#1b4332;
  --amber:#b45309;
  --amber-light:#fef3c7;
  --amber-text:#78350f;
  --radius:10px;
  --radius-sm:6px;
  --font:'DM Sans',sans-serif;
  --font-display:'Lora',serif;
  --font-mono:'DM Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5;}
.app{max-width:680px;margin:0 auto;padding:24px 16px 100px;}

/* HEADER */
.app-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;}
.app-title{font-family:var(--font-display);font-size:26px;font-weight:600;color:var(--text);letter-spacing:-0.3px;font-style:italic;}
.app-title span{color:var(--accent);font-style:normal;}
.header-right{text-align:right;}
.app-date{font-size:12px;color:var(--text-muted);font-family:var(--font-mono);}
.app-greeting{font-size:13px;color:var(--text-faint);margin-top:2px;}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--surface3);border-radius:var(--radius);padding:3px;margin-bottom:24px;}
.tab-btn{flex:1;padding:9px 4px;border:none;background:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.tab-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(160,110,70,0.15);}
.tab-btn:hover:not(.active){color:var(--text);}

/* SECTIONS */
.section{display:none;}
.section.active{display:block;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--text-faint);}

/* ── HOME ── */
.home-greeting-line{font-family:var(--font-display);font-size:22px;font-weight:500;color:var(--text);margin-bottom:2px;}
.home-date-line{font-size:13px;color:var(--text-muted);margin-bottom:20px;}
.today-summary{display:flex;align-items:center;gap:8px;margin-bottom:24px;padding:12px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);}
.summary-num{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--accent);line-height:1;margin-right:2px;}
.summary-text{font-size:13px;color:var(--text-muted);}
.summary-divider{width:1px;height:20px;background:var(--border-strong);margin:0 4px;}
.pad-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--text-faint);margin-bottom:8px;}
.scratch-pad{width:100%;min-height:130px;border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;font-family:var(--font);font-size:14px;color:var(--text);background:var(--surface);resize:none;line-height:1.6;transition:border-color 0.15s;margin-bottom:6px;}
.scratch-pad:focus{outline:none;border-color:var(--border-strong);}
.scratch-pad::placeholder{color:var(--text-faint);}
.pad-saved{font-size:11px;color:var(--text-faint);font-family:var(--font-mono);height:14px;}
.home-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--text-faint);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;margin-top:26px;}
.home-section-title button{font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:var(--font);padding:0;font-weight:400;text-transform:none;letter-spacing:0;}
.home-task-row{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:11px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.home-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border-strong);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;padding:0;}
.home-check.done{background:var(--accent);border-color:var(--accent);}
.home-check.done::after{content:'';width:5px;height:3px;border-left:1.5px solid white;border-bottom:1.5px solid white;transform:rotate(-45deg) translateY(-1px);display:block;}
.home-task-name{flex:1;font-size:13px;color:var(--text);}
.home-task-name.done{text-decoration:line-through;color:var(--text-faint);}
.home-empty{padding:18px 0 8px;font-size:13px;color:var(--text-faint);text-align:center;}

/* ROLLOVER */
.rollover-banner{background:var(--amber-light);border:0.5px solid rgba(180,83,9,0.2);border-radius:var(--radius);padding:11px 14px;font-size:13px;color:var(--amber-text);margin-bottom:16px;display:none;gap:10px;align-items:center;justify-content:space-between;}
.rollover-banner.show{display:flex;}
.rollover-btns{display:flex;gap:6px;flex-shrink:0;}
.rollover-btn{padding:4px 10px;border-radius:99px;border:0.5px solid var(--amber);background:none;font-size:11px;color:var(--amber);cursor:pointer;font-family:var(--font);white-space:nowrap;}
.rollover-btn.primary{background:var(--amber);color:white;}

/* ── PROCRASTINATION NUDGE ── */
.nudge{margin-top:6px;padding:8px 10px;background:var(--amber-light);border:0.5px solid rgba(180,83,9,0.18);border-radius:var(--radius-sm);display:flex;align-items:flex-start;gap:8px;}
.nudge-icon{font-size:13px;flex-shrink:0;margin-top:1px;}
.nudge-body{flex:1;min-width:0;}
.nudge-text{font-size:12px;color:var(--amber-text);line-height:1.45;margin-bottom:5px;}
.nudge-actions{display:flex;gap:5px;flex-wrap:wrap;}
.nudge-btn{font-size:11px;padding:3px 9px;border-radius:99px;border:0.5px solid rgba(180,83,9,0.3);background:none;color:var(--amber-text);cursor:pointer;font-family:var(--font);transition:all .12s;}
.nudge-btn:hover{background:rgba(180,83,9,0.1);}
.nudge-btn.primary{background:var(--amber);color:white;border-color:var(--amber);}
.nudge-btn.primary:hover{background:var(--amber-text);}
.nudge-dismiss{background:none;border:none;color:var(--amber-text);opacity:0.5;cursor:pointer;font-size:13px;padding:0 2px;flex-shrink:0;line-height:1;margin-top:1px;}
.nudge-dismiss:hover{opacity:1;}

/* week nudge (inline, compact) */
.wk-nudge{font-size:11px;color:var(--amber-text);background:var(--amber-light);border-radius:4px;padding:4px 8px;margin:2px 0 2px 24px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.wk-nudge-text{flex:1;}
.wk-nudge-btn{font-size:10px;padding:2px 7px;border-radius:99px;border:0.5px solid rgba(180,83,9,0.3);background:none;color:var(--amber-text);cursor:pointer;font-family:var(--font);white-space:nowrap;}
.wk-nudge-btn:hover{background:rgba(180,83,9,0.1);}

/* ── WEEKLY PLANNER ── */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.week-range-label{font-family:var(--font-display);font-size:15px;font-style:italic;color:var(--text);}
.week-nav-btns{display:flex;gap:4px;}
.week-arrow{width:28px;height:28px;border:0.5px solid var(--border-strong);background:none;border-radius:var(--radius-sm);cursor:pointer;color:var(--text-muted);font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.week-arrow:hover{background:var(--surface2);}
.week-today-btn{height:28px;padding:0 10px;border:0.5px solid var(--border-strong);background:none;border-radius:var(--radius-sm);cursor:pointer;color:var(--text-muted);font-size:11px;font-family:var(--font);transition:all .12s;}
.week-today-btn:hover{background:var(--surface2);}

.week-grid{display:flex;flex-direction:column;gap:8px;}
.day-col{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.day-col.is-today{border-color:rgba(196,92,42,0.5);box-shadow:0 0 0 1.5px rgba(196,92,42,0.1);}
.day-col.is-past{opacity:0.65;}

.day-col-header{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;cursor:pointer;user-select:none;transition:background .12s;}
.day-col-header:hover{background:var(--surface2);}
.day-header-left{display:flex;align-items:center;gap:8px;}
.today-pip{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.day-name{font-size:13px;font-weight:600;color:var(--text);}
.day-date-lbl{font-size:11px;font-family:var(--font-mono);color:var(--text-faint);}
.day-header-right{display:flex;align-items:center;gap:8px;}
.day-task-count{font-size:11px;font-family:var(--font-mono);color:var(--text-faint);}
.day-task-count.has{color:var(--accent);}
.day-chevron{font-size:10px;color:var(--text-faint);transition:transform .15s;line-height:1;}
.day-chevron.open{transform:rotate(180deg);}

.day-body{display:none;padding:6px 10px 10px;}
.day-body.open{display:block;}

/* week task rows */
.week-task{display:flex;align-items:center;gap:8px;padding:5px 4px;border-radius:6px;transition:background .1s;position:relative;}
.week-task:hover{background:var(--surface2);}
.wk-check{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border-strong);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0;}
.wk-check.done{background:var(--green);border-color:var(--green);}
.wk-check.done::after{content:'';width:4px;height:3px;border-left:1.5px solid white;border-bottom:1.5px solid white;transform:rotate(-45deg) translateY(-1px);display:block;}
.wk-name{flex:1;font-size:13px;color:var(--text);line-height:1.3;}
.wk-name.done{text-decoration:line-through;color:var(--text-faint);}
.wk-actions{display:flex;gap:2px;opacity:0;transition:opacity .12s;}
.week-task:hover .wk-actions{opacity:1;}
.wk-btn{width:24px;height:24px;border:none;background:none;cursor:pointer;border-radius:4px;color:var(--text-faint);font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.wk-btn:hover{background:var(--surface3);color:var(--text-muted);}

/* move-to-day popup */
.move-popup{position:absolute;right:0;top:26px;background:var(--surface);border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:4px;z-index:60;min-width:140px;box-shadow:0 4px 18px rgba(44,24,16,0.13);display:none;}
.move-popup.open{display:block;}
.move-popup button{display:block;width:100%;text-align:left;padding:6px 10px;border:none;background:none;font-family:var(--font);font-size:12px;color:var(--text-muted);cursor:pointer;border-radius:4px;}
.move-popup button:hover{background:var(--surface2);color:var(--text);}

/* day inline add */
.day-add-wrap{margin-top:6px;border-top:0.5px dashed var(--border);padding-top:8px;}
.day-add-input{width:100%;border:none;background:none;font-family:var(--font);font-size:13px;color:var(--text);padding:3px 2px;display:none;}
.day-add-input::placeholder{color:var(--text-faint);}
.day-add-input:focus{outline:none;}
.day-add-input.show{display:block;}
.day-add-trigger{display:flex;align-items:center;gap:6px;background:none;border:none;font-family:var(--font);font-size:12px;color:var(--text-faint);cursor:pointer;padding:2px 2px;transition:color .12s;width:100%;}
.day-add-trigger:hover{color:var(--text-muted);}
.day-add-trigger.hidden{display:none;}
.master-pull-toggle{font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:var(--font);padding:3px 2px;margin-top:4px;display:block;transition:opacity .12s;}
.master-pull-toggle:hover{opacity:0.7;}
.master-pull-list{display:none;margin-top:6px;border-top:0.5px solid var(--border);padding-top:6px;}
.master-pull-list.open{display:block;}
.pull-row{display:flex;align-items:center;justify-content:space-between;padding:4px 2px;gap:8px;border-radius:4px;transition:background .1s;}
.pull-row:hover{background:var(--surface2);}
.pull-name{flex:1;font-size:12px;color:var(--text-muted);}
.pull-btn{font-size:11px;padding:2px 9px;border-radius:99px;border:0.5px solid var(--border-strong);background:none;color:var(--text-faint);cursor:pointer;font-family:var(--font);white-space:nowrap;transition:all .12s;}
.pull-btn:hover{border-color:var(--accent);color:var(--accent);}
.pull-empty{font-size:12px;color:var(--text-faint);padding:3px 2px;}

/* ── TASK CARDS ── */
.task-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:7px;transition:box-shadow 0.15s;}
.task-card:hover{box-shadow:0 2px 10px rgba(160,110,70,0.08);}
.task-card.completed{opacity:0.45;}
.task-top{display:flex;align-items:flex-start;gap:10px;}
.check-btn{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border-strong);background:none;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;padding:0;}
.check-btn.done{background:var(--green);border-color:var(--green);}
.check-btn.done::after{content:'';width:5px;height:3px;border-left:1.5px solid white;border-bottom:1.5px solid white;transform:rotate(-45deg) translateY(-1px);display:block;}
.task-body{flex:1;min-width:0;}
.task-name{font-size:14px;font-weight:500;color:var(--text);word-break:break-word;}
.task-name.done{text-decoration:line-through;color:var(--text-faint);}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap;}
.badge{font-size:11px;padding:2px 7px;border-radius:99px;font-weight:500;}
.badge-day{background:var(--accent-light);color:var(--accent-text);}
.badge-today{background:var(--green-light);color:var(--green-text);}
.badge-cat{background:var(--surface2);color:var(--text-muted);}
.task-actions{display:flex;gap:2px;flex-shrink:0;}
.icon-btn{width:28px;height:28px;border:none;background:none;cursor:pointer;border-radius:var(--radius-sm);color:var(--text-faint);font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.12s;}
.icon-btn:hover{background:var(--surface2);color:var(--text-muted);}
.task-expand{margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);display:none;}
.task-expand.open{display:block;}
.expand-row{margin-bottom:10px;}
.expand-label{font-size:10px;font-weight:600;color:var(--text-faint);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;}
.note-input{width:100%;border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:7px 9px;font-family:var(--font);font-size:13px;color:var(--text);background:var(--surface);resize:none;min-height:56px;line-height:1.5;}
.note-input:focus{outline:none;border-color:var(--accent);}
.day-chip-row{display:flex;gap:5px;flex-wrap:wrap;}
.day-chip{padding:4px 11px;border-radius:99px;font-size:12px;border:0.5px solid var(--border-strong);background:none;color:var(--text-muted);cursor:pointer;font-family:var(--font);transition:all 0.12s;}
.day-chip:hover{background:var(--accent-light);color:var(--accent-text);border-color:var(--accent);}
.day-chip.sel{background:var(--accent);color:white;border-color:var(--accent);}
.day-chip.is-today{border-color:var(--accent);color:var(--accent);}
.day-chip.is-today.sel{background:var(--accent);color:white;}
.custom-date-row{display:flex;gap:6px;align-items:center;margin-top:6px;}
.date-inp{border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:5px 8px;font-family:var(--font);font-size:12px;color:var(--text);background:var(--surface);}
.date-inp:focus{outline:none;border-color:var(--accent);}
.clear-sched{padding:4px 10px;border-radius:99px;font-size:11px;border:0.5px solid var(--border-strong);background:none;color:var(--text-faint);cursor:pointer;font-family:var(--font);}
.clear-sched:hover{border-color:var(--accent);color:var(--accent);}

/* TO BUY */
.cat-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.cat-chip{padding:4px 11px;border-radius:99px;font-size:12px;border:0.5px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;font-family:var(--font);transition:all 0.12s;}
.cat-chip:hover{border-color:var(--border-strong);}
.cat-chip.active{background:var(--accent);border-color:var(--accent);color:white;}
.cat-filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.cat-filter{padding:4px 11px;border-radius:99px;font-size:11px;border:0.5px solid var(--border);background:none;color:var(--text-faint);cursor:pointer;font-family:var(--font);transition:all 0.12s;}
.cat-filter.active{border-color:var(--border-strong);color:var(--text);background:var(--surface2);}

/* ADD FORM */
.add-form{background:var(--surface);border:0.5px dashed var(--border-strong);border-radius:var(--radius);padding:12px 14px;margin-top:4px;display:none;}
.add-form.show{display:block;}
.add-input{width:100%;border:none;border-bottom:0.5px solid var(--border);padding:4px 0 8px;font-family:var(--font);font-size:14px;color:var(--text);background:none;margin-bottom:10px;}
.add-input:focus{outline:none;border-bottom-color:var(--accent);}
.add-input::placeholder{color:var(--text-faint);}
.add-row{display:flex;gap:8px;justify-content:flex-end;}
.btn{padding:6px 14px;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--border-strong);background:none;color:var(--text-muted);transition:all 0.12s;}
.btn:hover{background:var(--surface2);}
.btn-primary{background:var(--accent);color:white;border-color:var(--accent);}
.btn-primary:hover{background:var(--accent-text);}
.add-trigger{display:flex;align-items:center;gap:8px;padding:10px 14px;border:0.5px dashed var(--border-strong);border-radius:var(--radius);font-size:13px;color:var(--text-faint);cursor:pointer;background:none;width:100%;font-family:var(--font);transition:all 0.12s;margin-top:4px;}
.add-trigger:hover{background:var(--surface);color:var(--text-muted);}
.add-trigger.hidden{display:none;}

/* MISC */
.empty{text-align:center;padding:36px 20px;color:var(--text-faint);font-size:13px;}
.empty-icon{font-size:26px;margin-bottom:8px;}
.done-divider{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);margin:16px 0 8px;padding-top:8px;border-top:0.5px solid var(--border);}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px;}
@media(max-width:600px){
  .app{padding:16px 12px 110px;}
  .app-title{font-size:22px;}
  .tabs{gap:1px;}
  .tab-btn{font-size:11px;padding:8px 2px;}
  .check-btn,.home-check,.wk-check{width:20px;height:20px;}
  .add-input{font-size:16px;}
  .rollover-banner{flex-direction:column;align-items:flex-start;}
  .rollover-btns{align-self:flex-end;}
}
</style>
</head>
<body>
<div class="app">

  <div class="app-header">
    <div class="app-title">Day<span>flow</span></div>
    <div class="header-right">
      <div class="app-date" id="todayLabel"></div>
      <div class="app-greeting" id="greetingLine"></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('home',this)">Home</button>
    <button class="tab-btn" onclick="switchTab('week',this)">Week</button>
    <button class="tab-btn" onclick="switchTab('today',this)">Today</button>
    <button class="tab-btn" onclick="switchTab('master',this)">Master</button>
    <button class="tab-btn" onclick="switchTab('tobuy',this)">To Buy</button>
  </div>

  <!-- HOME -->
  <div id="tab-home" class="section active">
    <div class="home-greeting-line" id="homeGreeting"></div>
    <div class="home-date-line" id="homeDateFull"></div>
    <div class="today-summary">
      <span class="summary-num" id="summaryLeft">0</span>
      <span class="summary-text">tasks left today</span>
      <div class="summary-divider"></div>
      <span class="summary-num" id="summaryDone" style="color:var(--green)">0</span>
      <span class="summary-text">done</span>
    </div>
    <div class="pad-label">Scratch pad</div>
    <textarea class="scratch-pad" id="scratchPad" placeholder="Jot anything down — ideas, reminders, random thoughts…" oninput="savePad()"></textarea>
    <div class="pad-saved" id="padSaved"></div>
    <div class="home-section-title">
      Today's tasks
      <button onclick="switchTabByName('today')">See all →</button>
    </div>
    <div id="rolloverHome" class="rollover-banner">
      <span id="rolloverTextHome"></span>
      <div class="rollover-btns">
        <button class="rollover-btn" onclick="dismissRollover()">Clear them</button>
        <button class="rollover-btn primary" onclick="keepRollover()">Keep them</button>
      </div>
    </div>
    <div id="homeTodayList"></div>
  </div>

  <!-- WEEK -->
  <div id="tab-week" class="section">
    <div class="week-nav">
      <div class="week-range-label" id="weekRangeLabel"></div>
      <div class="week-nav-btns">
        <button class="week-arrow" onclick="shiftWeek(-1)">‹</button>
        <button class="week-today-btn" onclick="shiftWeek(0)">This week</button>
        <button class="week-arrow" onclick="shiftWeek(1)">›</button>
      </div>
    </div>
    <div class="week-grid" id="weekGrid"></div>
  </div>

  <!-- TODAY -->
  <div id="tab-today" class="section">
    <div id="rolloverToday" class="rollover-banner">
      <span id="rolloverTextToday"></span>
      <div class="rollover-btns">
        <button class="rollover-btn" onclick="dismissRollover()">Clear them</button>
        <button class="rollover-btn primary" onclick="keepRollover()">Keep them</button>
      </div>
    </div>
    <div class="section-header"><span class="section-label">Today</span></div>
    <div id="todayList"></div>
    <button class="add-trigger" id="trigger-today" onclick="showAdd('today')">+ Add a task</button>
    <div class="add-form" id="addForm-today">
      <input class="add-input" id="addInput-today" placeholder="What needs to get done today?"/>
      <div class="add-row">
        <button class="btn" onclick="hideAdd('today')">Cancel</button>
        <button class="btn btn-primary" onclick="addTask('today')">Add</button>
      </div>
    </div>
  </div>

  <!-- MASTER -->
  <div id="tab-master" class="section">
    <div class="section-header"><span class="section-label">Master List</span></div>
    <div id="masterList"></div>
    <button class="add-trigger" id="trigger-master" onclick="showAdd('master')">+ Add to master list</button>
    <div class="add-form" id="addForm-master">
      <input class="add-input" id="addInput-master" placeholder="Anything you want to tackle someday…"/>
      <div class="add-row">
        <button class="btn" onclick="hideAdd('master')">Cancel</button>
        <button class="btn btn-primary" onclick="addTask('master')">Add</button>
      </div>
    </div>
  </div>

  <!-- TO BUY -->
  <div id="tab-tobuy" class="section">
    <div class="section-header"><span class="section-label">To Buy</span></div>
    <div class="cat-filter-row" id="catFilterRow"></div>
    <div id="tobuyList"></div>
    <button class="add-trigger" id="trigger-tobuy" onclick="showAdd('tobuy')">+ Add an item</button>
    <div class="add-form" id="addForm-tobuy">
      <input class="add-input" id="addInput-tobuy" placeholder="What do you need to buy?"/>
      <div class="cat-row" id="addCatRow"></div>
      <div class="add-row">
        <button class="btn" onclick="hideAdd('tobuy')">Cancel</button>
        <button class="btn btn-primary" onclick="addTask('tobuy')">Add</button>
      </div>
    </div>
  </div>

</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const CATS = ['Grocery','Home','Clothes','Other'];
let selCat = 'Grocery', filterCat = 'All', weekOffset = 0;
let data = { today:[], master:[], tobuy:[], pad:'' };

function save() { localStorage.setItem('dayflow_v2', JSON.stringify(data)); }
function load() {
  try { const s = localStorage.getItem('dayflow_v2'); if (s) data = JSON.parse(s); } catch(e){}
  if (!Array.isArray(data.today))  data.today  = [];
  if (!Array.isArray(data.master)) data.master = [];
  if (!Array.isArray(data.tobuy))  data.tobuy  = [];
  if (!data.pad) data.pad = '';
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const todayStr = () => new Date().toISOString().slice(0,10);
const esc = s => s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
function greeting() { const h=new Date().getHours(); return h<12?'Good morning':h<17?'Good afternoon':'Good evening'; }
function fmtDate(ds) {
  if (!ds) return '';
  return new Date(ds+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function dayLabel(ds) {
  if (!ds) return '';
  const t = todayStr();
  const tom = new Date(); tom.setDate(tom.getDate()+1);
  const tomS = tom.toISOString().slice(0,10);
  if (ds===t) return 'Today';
  if (ds===tomS) return 'Tomorrow';
  return fmtDate(ds);
}
function next7() {
  const DAY = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'], out = [];
  for (let i=0;i<7;i++) {
    const d=new Date(); d.setDate(d.getDate()+i);
    out.push({ str:d.toISOString().slice(0,10), label:i===0?'Today':i===1?'Tomorrow':DAY[d.getDay()] });
  }
  return out;
}
function weekDates(offset) {
  const today=new Date(), dow=today.getDay();
  const mondayDiff = dow===0 ? -6 : 1-dow;
  const mon = new Date(today); mon.setDate(today.getDate()+mondayDiff+offset*7);
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d.toISOString().slice(0,10); });
}

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  load();
  const now = new Date();
  document.getElementById('todayLabel').textContent = now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  document.getElementById('greetingLine').textContent = greeting();
  document.getElementById('homeGreeting').textContent = greeting();
  document.getElementById('homeDateFull').textContent = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  document.getElementById('scratchPad').value = data.pad || '';
  checkRollover();
  buildCatFilters();
  renderAll();
}

// ─── TABS ────────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name==='week') renderWeek();
  if (name==='home') renderHome();
}
function switchTabByName(name) {
  switchTab(name, document.querySelectorAll('.tab-btn')[{home:0,week:1,today:2,master:3,tobuy:4}[name]]);
}

// ─── SCRATCH PAD ─────────────────────────────────────────────────────────────
let padTimer;
function savePad() {
  data.pad = document.getElementById('scratchPad').value;
  clearTimeout(padTimer);
  document.getElementById('padSaved').textContent = '';
  padTimer = setTimeout(() => {
    save();
    document.getElementById('padSaved').textContent = 'Saved';
    setTimeout(()=>{ document.getElementById('padSaved').textContent=''; }, 1800);
  }, 600);
}

// ─── ROLLOVER ────────────────────────────────────────────────────────────────
function checkRollover() {
  const last = localStorage.getItem('dayflow_last_date'), today = todayStr();
  if (last && last !== today) {
    const inc = (data.today||[]).filter(t=>!t.completed);
    if (inc.length) {
      const msg = `${inc.length} unfinished task${inc.length>1?'s':''} from ${fmtDate(last)}`;
      ['rolloverHome','rolloverToday'].forEach(id => {
        const el=document.getElementById(id), ti=document.getElementById(id==='rolloverHome'?'rolloverTextHome':'rolloverTextToday');
        if(el&&ti){ti.textContent=msg; el.classList.add('show');}
      });
    }
  }
  localStorage.setItem('dayflow_last_date', today);
}
function dismissRollover() { data.today=(data.today||[]).filter(t=>t.completed); save(); hideRolloverBanner(); renderAll(); }
function keepRollover() { (data.today||[]).forEach(t=>{ if(!t.completed) t.scheduledDate=todayStr(); }); save(); hideRolloverBanner(); renderAll(); }
function hideRolloverBanner() { ['rolloverHome','rolloverToday'].forEach(id=>{ const el=document.getElementById(id); if(el) el.classList.remove('show'); }); }

// ─── ADD FORMS ───────────────────────────────────────────────────────────────
function showAdd(list) {
  document.getElementById('addForm-'+list).classList.add('show');
  document.getElementById('trigger-'+list).classList.add('hidden');
  setTimeout(()=>document.getElementById('addInput-'+list).focus(), 50);
  if (list==='tobuy') buildAddCatRow();
}
function hideAdd(list) {
  document.getElementById('addForm-'+list).classList.remove('show');
  document.getElementById('trigger-'+list).classList.remove('hidden');
  document.getElementById('addInput-'+list).value = '';
}
function buildAddCatRow() {
  document.getElementById('addCatRow').innerHTML = CATS.map(c=>
    `<button class="cat-chip${c===selCat?' active':''}" onclick="selCatFn('${c}')">${c}</button>`
  ).join('');
}
function selCatFn(c) { selCat=c; buildAddCatRow(); }

function addTask(list) {
  const inp = document.getElementById('addInput-'+list);
  const name = inp.value.trim(); if (!name) return;
  const task = { id:uid(), name, completed:false, createdAt:todayStr(), note:'', list };
  if (list==='today') task.scheduledDate = todayStr();
  if (list==='tobuy') task.category = selCat;
  data[list].push(task);
  save(); inp.value=''; hideAdd(list);
  renderList(list);
  if (list==='today') renderHome();
}

// ─── WEEKLY PLANNER ──────────────────────────────────────────────────────────
const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function shiftWeek(dir) { weekOffset = dir===0 ? 0 : weekOffset+dir; renderWeek(); }

function tasksForDate(ds) {
  const fromToday  = (data.today ||[]).filter(t=>t.scheduledDate===ds);
  const fromMaster = (data.master||[]).filter(t=>t.scheduledDate===ds);
  return [...fromToday,...fromMaster];
}
function freeMaster() { return (data.master||[]).filter(t=>!t.scheduledDate&&!t.completed); }

function renderWeek() {
  const dates = weekDates(weekOffset);
  const today = todayStr();
  const first = new Date(dates[0]+'T00:00:00'), last = new Date(dates[6]+'T00:00:00');
  const o = {month:'short',day:'numeric'};
  document.getElementById('weekRangeLabel').textContent =
    first.toLocaleDateString('en-US',o)+' – '+last.toLocaleDateString('en-US',o);

  document.getElementById('weekGrid').innerHTML = dates.map((ds,i) => {
    const tasks   = tasksForDate(ds);
    const isToday = ds===today;
    const isPast  = ds<today;
    const pending = tasks.filter(t=>!t.completed);
    const done    = tasks.filter(t=> t.completed);
    const autoOpen = isToday || (!isPast && weekOffset===0);
    const countTxt = tasks.length ? `${done.length}/${tasks.length}` : '';

    const taskRows = [
      ...pending.map(t=>weekTaskRow(t,ds,false)),
      ...done.map(t=>weekTaskRow(t,ds,true))
    ].join('');

    return `<div class="day-col${isToday?' is-today':''}${isPast?' is-past':''}" id="dc-${ds}">
      <div class="day-col-header" onclick="toggleDayBody('${ds}')">
        <div class="day-header-left">
          ${isToday?'<div class="today-pip"></div>':''}
          <span class="day-name">${DAY_NAMES[i]}</span>
          <span class="day-date-lbl">${new Date(ds+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
        </div>
        <div class="day-header-right">
          <span class="day-task-count${tasks.length?' has':''}">${countTxt}</span>
          <span class="day-chevron${autoOpen?' open':''}" id="chev-${ds}">▾</span>
        </div>
      </div>
      <div class="day-body${autoOpen?' open':''}" id="db-${ds}">
        ${taskRows}
        ${!tasks.length?'<div style="font-size:12px;color:var(--text-faint);padding:2px 2px 4px">Nothing planned yet</div>':''}
        <div class="day-add-wrap">
          <button class="day-add-trigger" id="dat-${ds}" onclick="showDayAdd('${ds}')">+ Add task</button>
          <input class="day-add-input" id="dai-${ds}" placeholder="Task name, then Enter…"
            onkeydown="dayAddKey(event,'${ds}')" onblur="hideDayAdd('${ds}')"/>
          <button class="master-pull-toggle" onclick="togglePull('${ds}')">↓ Pull from master list</button>
          <div class="master-pull-list" id="mpl-${ds}">${masterPullHTML(ds)}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleDayBody(ds) {
  document.getElementById('db-'+ds).classList.toggle('open');
  document.getElementById('chev-'+ds).classList.toggle('open');
}

function weekTaskRow(task, ds, isDone) {
  const showNudge = !isDone && (task.rolloverCount||0) >= 2 && !task.nudgeDismissed;
  const nudgeMsg = nudgeMessage(task.rolloverCount||0);
  const nudgeHTML = showNudge ? `
    <div class="wk-nudge" id="wkn-${task.id}">
      <span class="wk-nudge-text">🌀 ${nudgeMsg}</span>
      <button class="wk-nudge-btn" onmousedown="nudgeSendToMaster('${task.id}')">→ Master list</button>
      <button class="wk-nudge-btn" onmousedown="nudgeDismiss('${task.id}')">Got it</button>
    </div>` : '';
  return `<div id="wt-${task.id}">
    <div class="week-task">
      <button class="wk-check${isDone?' done':''}" onclick="weekCheck('${task.id}','${ds}')"></button>
      <span class="wk-name${isDone?' done':''}">${esc(task.name)}</span>
      <div class="wk-actions">
        <div style="position:relative">
          <button class="wk-btn" title="Move to another day" onclick="toggleMoveMenu('${task.id}','${ds}')">↷</button>
          <div class="move-popup" id="mp-${task.id}">${moveMenuHTML(ds,task.id)}</div>
        </div>
        <button class="wk-btn" title="Remove from this day" onclick="removeFromDay('${task.id}','${ds}')">✕</button>
      </div>
    </div>
    ${nudgeHTML}
  </div>`;
}

function moveMenuHTML(fromDs, taskId) {
  const allDates = weekDates(weekOffset);
  const nextWk   = weekDates(weekOffset+1);
  const options  = [...allDates.filter(d=>d>fromDs), ...nextWk].slice(0,7);
  if (!options.length) return '<div style="padding:6px 10px;font-size:12px;color:var(--text-faint)">No later days available</div>';
  return options.map(d=>`<button onmousedown="moveDay('${taskId}','${d}')">${dayLabel(d)}</button>`).join('');
}

function toggleMoveMenu(taskId, ds) {
  const menu = document.getElementById('mp-'+taskId);
  if (!menu) return;
  const wasOpen = menu.classList.contains('open');
  document.querySelectorAll('.move-popup').forEach(m=>m.classList.remove('open'));
  if (!wasOpen) { menu.innerHTML = moveMenuHTML(ds, taskId); menu.classList.add('open'); }
}
document.addEventListener('click', e => {
  if (!e.target.closest('[id^="mp-"]') && !e.target.closest('.wk-btn')) {
    document.querySelectorAll('.move-popup').forEach(m=>m.classList.remove('open'));
  }
});

function weekCheck(taskId, ds) {
  let task = findTask(taskId);
  if (!task) return;
  task.completed = !task.completed;
  save(); renderWeek(); renderHome();
  renderList('today'); renderList('master');
}

function moveDay(taskId, newDs) {
  let task = findTask(taskId);
  if (!task) return;
  const wasInToday  = !!(data.today ||[]).find(t=>t.id===taskId);
  const wasInMaster = !!(data.master||[]).find(t=>t.id===taskId);
  // Track how many times this task has been rolled over
  task.rolloverCount = (task.rolloverCount || 0) + 1;
  task.nudgeDismissed = false; // re-surface nudge on each new move
  task.scheduledDate = newDs;
  const goesToToday = newDs <= todayStr();
  if (goesToToday && wasInMaster) {
    data.master = data.master.filter(t=>t.id!==taskId);
    task.list = 'today'; data.today.push(task);
  } else if (!goesToToday && wasInToday) {
    data.today = data.today.filter(t=>t.id!==taskId);
    task.list = 'master'; data.master.push(task);
  }
  save();
  document.querySelectorAll('.move-popup').forEach(m=>m.classList.remove('open'));
  renderWeek(); renderList('today'); renderList('master'); renderHome();
}

function removeFromDay(taskId, ds) {
  let task = findTask(taskId);
  if (!task) return;
  task.scheduledDate = null;
  if (data.today.find(t=>t.id===taskId)) {
    data.today = data.today.filter(t=>t.id!==taskId);
    task.list = 'master'; data.master.push(task);
  }
  save(); renderWeek(); renderList('today'); renderList('master'); renderHome();
}

// Day inline add
function showDayAdd(ds) {
  document.getElementById('dai-'+ds).classList.add('show');
  document.getElementById('dat-'+ds).classList.add('hidden');
  setTimeout(()=>document.getElementById('dai-'+ds).focus(),30);
}
function hideDayAdd(ds) {
  setTimeout(()=>{
    const inp=document.getElementById('dai-'+ds); if(inp){inp.classList.remove('show');inp.value='';}
    const btn=document.getElementById('dat-'+ds); if(btn) btn.classList.remove('hidden');
  },160);
}
function dayAddKey(e, ds) {
  if (e.key==='Enter') {
    e.preventDefault();
    const inp=document.getElementById('dai-'+ds), name=inp.value.trim(); if(!name) return;
    const goesToToday = ds <= todayStr();
    const task = { id:uid(), name, completed:false, createdAt:todayStr(), note:'', scheduledDate:ds, list:goesToToday?'today':'master' };
    if (goesToToday) data.today.push(task); else data.master.push(task);
    save(); inp.value=''; renderWeek();
    if (goesToToday) { renderList('today'); renderHome(); } else renderList('master');
  }
  if (e.key==='Escape') hideDayAdd(ds);
}

// Pull from master
function togglePull(ds) {
  const panel = document.getElementById('mpl-'+ds);
  if (!panel) return;
  const wasOpen = panel.classList.contains('open');
  document.querySelectorAll('.master-pull-list').forEach(p=>p.classList.remove('open'));
  if (!wasOpen) { panel.innerHTML = masterPullHTML(ds); panel.classList.add('open'); }
}
function masterPullHTML(ds) {
  const avail = freeMaster();
  if (!avail.length) return '<div class="pull-empty">No unscheduled items in master list</div>';
  return avail.map(t=>`<div class="pull-row">
    <span class="pull-name">${esc(t.name)}</span>
    <button class="pull-btn" onmousedown="pullToDay('${t.id}','${ds}')">Add</button>
  </div>`).join('');
}
function pullToDay(taskId, ds) {
  const task = data.master.find(t=>t.id===taskId); if (!task) return;
  task.scheduledDate = ds;
  if (ds <= todayStr()) {
    data.master = data.master.filter(t=>t.id!==taskId);
    task.list = 'today'; data.today.push(task);
  }
  save();
  const panel = document.getElementById('mpl-'+ds);
  if (panel && panel.classList.contains('open')) panel.innerHTML = masterPullHTML(ds);
  renderWeek(); renderList('master'); renderList('today'); renderHome();
}

// ─── TODAY / MASTER / TOBUY RENDER ───────────────────────────────────────────
function renderToday() {
  const container = document.getElementById('todayList');
  const items = (data.today||[]).filter(t=>!t.scheduledDate||t.scheduledDate<=todayStr());
  if (!items.length) {
    container.innerHTML='<div class="empty"><div class="empty-icon">☀️</div>Nothing here — add a task or plan your week</div>'; return;
  }
  const pending=items.filter(t=>!t.completed), done=items.filter(t=>t.completed);
  container.innerHTML = pending.map(t=>taskCard(t,'today')).join('') +
    (done.length?`<div class="done-divider">Completed · ${done.length}</div>`+done.map(t=>taskCard(t,'today')).join(''):'');
}

function renderMaster() {
  const container = document.getElementById('masterList');
  const items = data.master||[];
  if (!items.length) {
    container.innerHTML='<div class="empty"><div class="empty-icon">🗂️</div>Your brain dump. Add anything, then schedule it to a day when you\'re ready.</div>'; return;
  }
  const unsched = items.filter(t=>!t.scheduledDate&&!t.completed);
  const sched   = items.filter(t=> t.scheduledDate&&!t.completed).sort((a,b)=>a.scheduledDate.localeCompare(b.scheduledDate));
  const done    = items.filter(t=>t.completed);
  container.innerHTML =
    unsched.map(t=>taskCard(t,'master')).join('') +
    (sched.length?`<div class="done-divider" style="color:var(--accent-text)">Scheduled · ${sched.length}</div>`+sched.map(t=>taskCard(t,'master')).join(''):'') +
    (done.length?`<div class="done-divider">Completed · ${done.length}</div>`+done.map(t=>taskCard(t,'master')).join(''):'');
}

function renderTobuy() {
  const container = document.getElementById('tobuyList');
  let items = data.tobuy||[];
  if (filterCat!=='All') items=items.filter(t=>t.category===filterCat);
  if (!items.length) {
    container.innerHTML=`<div class="empty"><div class="empty-icon">🛒</div>${filterCat==='All'?'Your shopping list is empty':'Nothing in '+filterCat}</div>`; return;
  }
  const pending=items.filter(t=>!t.completed), done=items.filter(t=>t.completed);
  container.innerHTML = pending.map(t=>taskCard(t,'tobuy')).join('') +
    (done.length?`<div class="done-divider">Got it · ${done.length}</div>`+done.map(t=>taskCard(t,'tobuy')).join(''):'');
}

function buildCatFilters() {
  document.getElementById('catFilterRow').innerHTML = ['All',...CATS].map(c=>
    `<button class="cat-filter${c===filterCat?' active':''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');
}
function setFilter(c) { filterCat=c; buildCatFilters(); renderTobuy(); }

// ─── HOME RENDER ─────────────────────────────────────────────────────────────
function renderHome() {
  const t = todayStr();
  const todayTasks = (data.today||[]).filter(t2=>!t2.scheduledDate||t2.scheduledDate<=t);
  const left=todayTasks.filter(t2=>!t2.completed).length;
  const done=todayTasks.filter(t2=>t2.completed).length;
  document.getElementById('summaryLeft').textContent=left;
  document.getElementById('summaryDone').textContent=done;
  const c=document.getElementById('homeTodayList');
  if (!todayTasks.length) { c.innerHTML='<div class="home-empty">Nothing scheduled for today</div>'; return; }
  const pending=todayTasks.filter(t2=>!t2.completed), comp=todayTasks.filter(t2=>t2.completed);
  const show=[...pending,...comp].slice(0,6);
  c.innerHTML=show.map(t2=>`<div class="home-task-row">
    <button class="home-check${t2.completed?' done':''}" onclick="homeCheck('${t2.id}')"></button>
    <span class="home-task-name${t2.completed?' done':''}">${esc(t2.name)}</span>
  </div>`).join('')+(todayTasks.length>6?`<div style="font-size:12px;color:var(--text-faint);padding:6px 0 0 2px">+${todayTasks.length-6} more</div>`:'');
}

// ─── TASK CARD ────────────────────────────────────────────────────────────────
function taskCard(task, list) {
  const dl = task.scheduledDate ? dayLabel(task.scheduledDate) : '';
  const badge = list==='master'&&task.scheduledDate
    ? `<span class="badge ${task.scheduledDate===todayStr()?'badge-today':'badge-day'}">${dl}</span>` : '';
  const catB = list==='tobuy'&&task.category
    ? `<span class="badge badge-cat">${esc(task.category)}</span>` : '';
  let expand = '';
  if (list==='master') {
    const days = next7();
    expand += `<div class="expand-row">
      <div class="expand-label">Schedule to day</div>
      <div class="day-chip-row">${days.map(d=>`<button class="day-chip${task.scheduledDate===d.str?' sel':''}${d.str===todayStr()&&task.scheduledDate!==d.str?' is-today':''}"
        onclick="schedTask('${task.id}','${d.str}')">${d.label}</button>`).join('')}</div>
      <div class="custom-date-row">
        <input type="date" class="date-inp" value="${task.scheduledDate||''}" min="${todayStr()}"
          onchange="schedToDate('${task.id}',this.value)"/>
        ${task.scheduledDate?`<button class="clear-sched" onclick="clearSched('${task.id}')">Clear</button>`:''}
      </div>
    </div>`;
  }
  expand += `<div class="expand-row">
    <div class="expand-label">Note</div>
    <textarea class="note-input" placeholder="Add a note…"
      onchange="updateNote('${list}','${task.id}',this.value)">${esc(task.note||'')}</textarea>
  </div>`;

  // Procrastination nudge (shown inline below task name, outside expand panel)
  const showNudge = !task.completed && (task.rolloverCount||0) >= 2 && !task.nudgeDismissed;
  const nudgeHTML = showNudge ? `
    <div class="nudge" id="nudge-${task.id}">
      <span class="nudge-icon">🌀</span>
      <div class="nudge-body">
        <div class="nudge-text">${nudgeMessage(task.rolloverCount||0)}</div>
        <div class="nudge-actions">
          <button class="nudge-btn primary" onclick="nudgeSendToMaster('${task.id}')">Send to master list</button>
          <button class="nudge-btn" onclick="nudgeDismiss('${task.id}')">I'll do it soon</button>
        </div>
      </div>
      <button class="nudge-dismiss" onclick="nudgeDismiss('${task.id}')" title="Dismiss">✕</button>
    </div>` : '';

  return `<div class="task-card${task.completed?' completed':''}" id="card-${task.id}">
    <div class="task-top">
      <button class="check-btn${task.completed?' done':''}" onclick="toggleComplete('${list}','${task.id}')"></button>
      <div class="task-body">
        <div class="task-name${task.completed?' done':''}">${esc(task.name)}</div>
        ${(badge||catB)?`<div class="task-meta">${badge}${catB}</div>`:''}
      </div>
      <div class="task-actions">
        <button class="icon-btn" onclick="toggleExpand('${task.id}')">✎</button>
        <button class="icon-btn" onclick="delTask('${list}','${task.id}')">✕</button>
      </div>
    </div>
    ${nudgeHTML}
    <div class="task-expand" id="exp-${task.id}">${expand}</div>
  </div>`;
}

// ─── SHARED TASK ACTIONS ─────────────────────────────────────────────────────
function findTask(id) {
  return (data.today||[]).find(t=>t.id===id) || (data.master||[]).find(t=>t.id===id) || (data.tobuy||[]).find(t=>t.id===id);
}
function toggleComplete(list, id) {
  const t=data[list].find(t=>t.id===id); if(!t) return;
  t.completed=!t.completed; save(); renderList(list);
  if(list==='today') renderHome(); renderWeek();
}
function homeCheck(id) {
  const t=data.today.find(t=>t.id===id); if(!t) return;
  t.completed=!t.completed; save(); renderHome(); renderList('today');
}
function delTask(list, id) {
  data[list]=data[list].filter(t=>t.id!==id); save(); renderList(list);
  if(list==='today') renderHome(); renderWeek();
}
function updateNote(list, id, val) {
  const t=data[list].find(t=>t.id===id); if(t){t.note=val;save();}
}
function toggleExpand(id) {
  const p=document.getElementById('exp-'+id); if(p) p.classList.toggle('open');
}
function schedTask(id, ds) {
  const task=data.master.find(t=>t.id===id); if(!task) return;
  task.scheduledDate = task.scheduledDate===ds ? null : ds;
  if (task.scheduledDate && task.scheduledDate<=todayStr()) {
    data.master=data.master.filter(t=>t.id!==id); task.list='today'; data.today.push(task);
    save(); renderList('master'); renderList('today'); renderHome(); renderWeek(); return;
  }
  save(); renderList('master'); renderWeek();
}
function schedToDate(id, val) { if(val) schedTask(id,val); }
function clearSched(id) {
  const task=data.master.find(t=>t.id===id); if(!task) return;
  task.scheduledDate=null; save(); renderList('master'); renderWeek();
}

function renderList(list) {
  if(list==='today') renderToday();
  else if(list==='master') renderMaster();
  else if(list==='tobuy') renderTobuy();
}
function renderAll() { renderHome(); renderWeek(); renderToday(); renderMaster(); renderTobuy(); }

// ─── PROCRASTINATION NUDGE ───────────────────────────────────────────────────
const NUDGE_MSGS = [
  "Still putting this off? No pressure — but maybe worth a think about why.",
  "This one keeps moving around. Is it still something you actually want to do?",
  "Third time rolling this over. It might be a 'someday' task in disguise.",
  "This task keeps following you around. What's the smallest possible step?",
  "Keeping this alive, or is it time to park it for later?",
];
function nudgeMessage(count) {
  const idx = Math.min(count - 2, NUDGE_MSGS.length - 1);
  return NUDGE_MSGS[Math.max(0, idx)];
}
function nudgeDismiss(taskId) {
  const task = findTask(taskId);
  if (!task) return;
  task.nudgeDismissed = true;
  save();
  // Remove nudge elements without full re-render
  ['nudge-','wkn-'].forEach(prefix => {
    const el = document.getElementById(prefix+taskId);
    if (el) el.remove();
  });
}
function nudgeSendToMaster(taskId) {
  // Move task to master list unscheduled
  let task = findTask(taskId);
  if (!task) return;
  task.scheduledDate = null;
  task.nudgeDismissed = true;
  if (data.today.find(t=>t.id===taskId)) {
    data.today = data.today.filter(t=>t.id!==taskId);
    task.list = 'master';
    data.master.push(task);
  }
  save();
  renderAll();
}

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const el=document.activeElement;
  if (!el||!el.classList.contains('add-input')) return;
  const list=el.id.replace('addInput-','');
  if(e.key==='Enter'){e.preventDefault();addTask(list);}
  if(e.key==='Escape') hideAdd(list);
});

init();
</script>
